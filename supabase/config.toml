project_id = "uouryrnyzicdociqberq"

# The daily digest is invoked by pg_cron with our own shared secret
# (see supabase/functions/daily-followup-digest/index.ts). Skipping
# Supabase's gateway-level JWT check lets that custom auth scheme run.
[functions.daily-followup-digest]
verify_jwt = false

# Resend posts webhook events with a Svix signature, not a Supabase
# JWT. The function itself verifies the signature against
# RESEND_WEBHOOK_SECRET; gateway-level JWT enforcement would reject
# every event before our code sees it (and historically did — every
# email.bounced was being dropped at the gateway with 401).
[functions.resend-webhook]
verify_jwt = false

# Fired by an AFTER UPDATE trigger on `offers` via pg_net when an offer
# is accepted (see 20260714130000_notify_offer_accepted.sql). The trigger
# presents CRON_SECRET as a Bearer token, which the function verifies —
# gateway-level JWT enforcement would reject the pg_net call.
[functions.notify-offer-accepted]
verify_jwt = false

# Proxy to the Mesonic WinLine MDP WebService. Only logged-in staff may
# reach it, so gateway-level JWT enforcement stays ON (the function also
# re-verifies the token via verifyAuth). This block is explicit for clarity;
# omitting it would default to the same verify_jwt = true.
[functions.mesonic-proxy]
verify_jwt = true
